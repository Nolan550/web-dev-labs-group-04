<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time table</title>
</head>
<body>
    <table border="1"> 
        <caption>STUDENT TIME TABLE</caption>
        <tr>
            <th>TIME</th>
            <th>MONDAY</th>
            <th>TUESDAY</th>
            <th>WEDNESDAY</th>
            <th>THURSDAY</th>
            <th>FRIDAY</th>
        </tr>
        <tr>
            <td>08:00AM-10:00AM</td>
            <td>MATHEMATICS</td>
            <td>CIVICS</td>
            <td>PHYSICS</td>
            <td>CHEMISTRY</td>
            <td>BIOLOGY</td>
        </tr>
        <tr>
            <td>10:00AM-10:30AM</td>
            <td colspan="5" align="center">BREAK FAST</td>

        </tr>
        <tr>
            <td>10:30AM-12:30PM</td>
            <td>BIOLOGY</td>
            <td>MATHEMATICS</td>
            <td>CHEMISTRY</td>
            <td>PHYSICS</td>
            <td>CIVICS</td>
        </tr>
        <tr>
            <td>12:30PM-13:30PM</td>
            <td colspan="5" align="center">LUNCH</td>

        </tr>
        <tr>
            <td>13:30PM-15:30PM</td>
            <td>BIOLOGY</td>
            <td>CHEMISTRY</td>
            <td>CIVICS</td>
            <td>MATHEMATICS</td>
            <td>PHYSICS</td>
            
        </tr>


    </table>
    
</body>
</html>
