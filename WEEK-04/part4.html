<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Combined Layout</title>
    <link rel="stylesheet" href="styles3.css">
</head>
<body>

    
    <header class="header">
        My Website Header
    </header>

    
    

    
    <div class="container">

        
        <div class="main-content box">
            <span class="label">NEW</span>
            <h2>Main Content</h2>
            <p>
                This section uses float left and contains a styled content box.
            </p>
        </div>

        
        <div class="sidebar box">
            <span class="label">HOT</span>
            <h2>Sidebar</h2>
            <p>
                This section uses float right and demonstrates layout control.
            </p>
        </div>

        
        <div class="clear"></div>

    </div>

    
    <footer class="footer">
        Footer Section
    </footer>

</body>
</html>
